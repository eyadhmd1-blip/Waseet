# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Waseet — Codemagic CI/CD Pipeline                                          ║
# ║                                                                              ║
# ║  Workflows:                                                                  ║
# ║    android-staging  →  APK signed release  →  Firebase App Distribution     ║
# ║    ios-staging      →  IPA signed release  →  Apple TestFlight              ║
# ║                                                                              ║
# ║  Both workflows:                                                             ║
# ║    1. Install Node dependencies                                              ║
# ║    2. Run expo prebuild (generates native Android / iOS projects)            ║
# ║    3. Build signed release artifact                                          ║
# ║    4. Publish to distribution platform                                       ║
# ║    5. Notify by email                                                        ║
# ║                                                                              ║
# ║  Required secrets — add in Codemagic → Teams → Global variables,            ║
# ║  or per-app under App settings → Environment variables.                      ║
# ║  Full setup guide: CICD.md                                                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

workflows:

  # ─────────────────────────────────────────────
  # ANDROID → Firebase App Distribution
  # ─────────────────────────────────────────────
  android-staging:
    name: Android Staging → Firebase App Distribution
    max_build_duration: 60
    instance_type: linux_x2
    working_directory: mobile

    environment:
      node: 20.18.0
      java: 17

      groups:
        - android_signing
        - firebase_credentials

      vars:
        PACKAGE_NAME: "com.waseet.app"
        APP_NAME: "Waseet"

        EXPO_PUBLIC_ENV: "staging"
        EXPO_PUBLIC_SUPABASE_URL: "https://bkbjsstxhvdnqcmpuulf.supabase.co"
        EXPO_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrYmpzc3R4aHZkbnFjbXB1dWxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMjY3ODcsImV4cCI6MjA5MTgwMjc4N30.-B_KTG1LYlKBlNCWjQhLKYfkp5lXN4xhIm1oMYhHsE4"
        EXPO_PUBLIC_PROJECT_ID: "ce995c3f-5df4-46fc-bc17-8cd30eefadbc"

    cache:
      cache_paths:
        - $CM_BUILD_DIR/mobile/node_modules
        - $HOME/.gradle/caches

    scripts:
      - name: Install dependencies
        script: npm ci --prefer-offline

      - name: Write google-services.json
        script: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > google-services.json
            mv google-services.json android/app/google-services.json
          fi

      - name: Expo prebuild Android
        script: npx expo prebuild --clean --platform android --non-interactive

      - name: Decode keystore
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/keystore.jks

      - name: Set version code
        script: echo "versionCode=$BUILD_NUMBER" >> android/gradle.properties

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=/tmp/keystore.jks \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"

    artifacts:
      - mobile/android/app/build/outputs/apk/release/*.apk

    publishing:
      firebase:
        firebase_token: $FIREBASE_TOKEN
        android:
          app_id: $FIREBASE_ANDROID_APP_ID
          groups:
            - testers
          artifact_type: apk

      email:
        recipients:
          - eyadhmd1@gmail.com
        notify:
          success: true
          failure: true


  # ─────────────────────────────────────────────
  # iOS → TestFlight
  # ─────────────────────────────────────────────
  ios-staging:
    name: iOS Staging → TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    working_directory: mobile

    environment:
      node: 20.18.0
      xcode: 16.2
      cocoapods: 1.16.2

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.waseet.app

      groups:
        - app_store_credentials
        - ios_credentials

      vars:
        EXPO_PUBLIC_ENV: "staging"
        EXPO_PUBLIC_SUPABASE_URL: "https://bkbjsstxhvdnqcmpuulf.supabase.co"
        EXPO_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrYmpzc3R4aHZkbnFjbXB1dWxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMjY3ODcsImV4cCI6MjA5MTgwMjc4N30.-B_KTG1LYlKBlNCWjQhLKYfkp5lXN4xhIm1oMYhHsE4"
        EXPO_PUBLIC_PROJECT_ID: "ce995c3f-5df4-46fc-bc17-8cd30eefadbc"

    cache:
      cache_paths:
        - $CM_BUILD_DIR/mobile/node_modules
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Install dependencies
        script: npm ci --prefer-offline

      - name: Expo prebuild iOS
        script: npx expo prebuild --clean --platform ios --non-interactive

      - name: Install pods
        script: |
          cd ios
          pod install

      - name: Apply signing
        script: xcode-project use-profiles

      - name: Set build number
        script: agvtool new-version -all "$BUILD_NUMBER"

      - name: Build IPA
        script: |
          xcodebuild \
            -workspace ios/*.xcworkspace \
            -scheme waseet \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/app.xcarchive \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/build/app.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ipa

    artifacts:
      - build/ipa/*.ipa
      - build/app.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false

      email:
        recipients:
          - eyadhmd1@gmail.com
        notify:
          success: true
          failure: true

